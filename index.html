<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<style>
:root{--bg:#8b5e3c;--bg-soft:#f6f1eb;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--white:#ffffff;--max:1120px}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#faf8f5;color:var(--text);line-height:1.7}
a{text-decoration:none;color:inherit}
.container{width:min(92%,var(--max));margin:auto}

header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line)}
.nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0}

.logo img{
  height:38px;
  display:block;
}

.nav-links{display:flex;gap:20px;color:var(--muted)}

.hero{
  padding:90px 0 70px;
  background:var(--bg);
  color:#fff;
}

.hero h1{
  font-size:clamp(2.4rem,5vw,3.8rem);
  line-height:1.25;
  margin:10px 0 22px;
  letter-spacing:1px;
}

.hero p{
  max-width:650px;
  color:#f3e8dd;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 22px;
  border-radius:999px;
  background:#fff;
  color:#4b2e1f;
  font-weight:700;
}

section{padding:70px 0}

.section-title{
  font-size:2rem;
  text-align:center;
  margin-bottom:12px;
}

.section-intro{
  text-align:center;
  color:var(--muted);
  margin-bottom:30px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card{
  background:#fff;
  padding:24px;
  border-radius:16px;
  border:1px solid var(--line);
}

.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.gallery img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:16px;
}

.contact-box{
  background:#fff;
  padding:24px;
  border-radius:16px;
  border:1px solid var(--line);
}

footer{
  text-align:center;
  padding:30px;
  color:#999;
}

.whatsapp{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#25D366;
  color:#fff;
  padding:12px 16px;
  border-radius:999px;
  font-weight:700;
}

@media(max-width:900px){
  .cards,.gallery{
    grid-template-columns:1fr;
  }
}
</style>
</head>

    </div>
  </div>

<footer>

</footer>
