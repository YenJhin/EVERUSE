<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVERUSE | 鞋包洗護・防除霉保養專家</title>
<meta name="description" content="EVERUSE 提供鞋類、包款、皮件清潔、防除霉與保養服務。">

<style>
:root{
  --bg:#8b5e3c;
  --bg-deep:#5e3b25;
  --bg-soft:#f6f1eb;
  --text:#1f2937;
  --muted:#6b7280;
  --line:#e5e7eb;
  --gold:#c6a27a;
  --max:1120px;
}

body{
  margin:0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background:#faf8f5;
  color:var(--text);
  line-height:1.7;
}

.container{width:min(92%,var(--max));margin:auto}
img{max-width:100%;display:block}

/* Header */
header{
  position:sticky;
  top:0;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,.05);
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand img{
  height:46px;
}

.brand-name{
  font-weight:700;
  letter-spacing:.2em;
  font-size:1rem;
}

.nav a{
  margin-left:12px;
  padding:8px 14px;
  border-radius:999px;
  font-size:.9rem;
}

.nav a:hover{
  background:#f3ede7;
}

/* Hero */
.hero{
  padding:110px 0 80px;
  background:linear-gradient(135deg,#4a2e1d,#8b5e3c);
  color:#fff;
}

.hero h1{
  font-size:clamp(2.6rem,5vw,4rem);
  margin-bottom:20px;
}

.hero p{
  max-width:600px;
  color:#f3e8dd;
}

.btn{
  display:inline-block;
  margin-top:25px;
  padding:12px 22px;
  border-radius:999px;
  font-weight:600;
}

.btn-primary{
  background:#fff;
  color:#4b2e1f;
}

.btn-secondary{
  border:1px solid rgba(255,255,255,.4);
  margin-left:10px;
}

/* Section */
section{padding:80px 0}

.section-title{
  text-align:center;
  font-size:2rem;
  margin-bottom:10px;
}

.section-intro{
  text-align:center;
  color:var(--muted);
  max-width:700px;
  margin:auto;
  margin-bottom:40px;
}

/* Cards */
.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card{
  background:#fff;
  padding:26px;
  border-radius:18px;
  box-shadow:0 8px 25px rgba(0,0,0,.05);
}

/* Gallery */
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.gallery img{
  height:260px;
  object-fit:cover;
  border-radius:16px;
  transition:.4s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* Contact */
.contact-box{
  background:#fff;
  padding:28px;
  border-radius:18px;
}

.cta{
  margin-top:25px;
  padding:25px;
  background:linear-gradient(135deg,#6e4630,#8b5e3c);
  color:#fff;
  border-radius:20px;
}

footer{
  text-align:center;
  padding:30px;
  color:#888;
}

@media(max-width:900px){
  .cards,
  .gallery{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="container nav">
    <div class="brand">
      <img src="logo.png.webp">
      <div class="brand-name">EVERUSE</div>
    </div>

    <div>
      <a href="#home">Home</a>
      <a href="#services">Services</a>
      <a href="#about">About</a>
      <a href="#cases">Cases</a>
      <a href="#contact">Contact</a>
    </div>
  </div>
</header>

<section class="hero" id="home">
  <div class="container">
    <h1>鞋包洗護・防除霉保養專家</h1>
    <p>專業處理鞋類、包款、皮件清潔與防霉保養，讓物件恢復最佳狀態。</p>

    <a class="btn btn-primary">立即諮詢</a>
    <a class="btn btn-secondary">了解服務</a>
  </div>
</section>

<section id="services">
  <div class="container">
    <h2 class="section-title">服務項目</h2>
    <p class="section-intro">依照不同材質與使用狀況提供專業處理。</p>

    <div class="cards">
      <div class="card"><h3>鞋包清潔養護</h3><p>恢復外觀質感</p></div>
      <div class="card"><h3>防除霉處理</h3><p>改善潮濕問題</p></div>
      <div class="card"><h3>品牌延伸</h3><p>跨領域合作</p></div>
    </div>
  </div>
</section>

<section id="cases">
  <div class="container">
    <h2 class="section-title">作品展示</h2>

    <div class="gallery">
      <img src="img1.jpg.webp" alt="">
      <img src="img2.jpg.webp" alt="">
      <img src="img3.jpg.webp" alt="">
      <img src="img4.jpg.webp" alt="">
      <img src="img5.jpg.webp" alt="">
      <img src="img6.jpg.webp" alt="">
    </div>
  </div>
</section>

<section id="contact">
  <div class="container">
    <h2 class="section-title">聯絡我們</h2>

    <div class="cta">
      歡迎透過 WhatsApp 與我們聯絡
    </div>
  </div>
</section>

<footer>
  © EVERUSE
</footer>

</body>
</html>
